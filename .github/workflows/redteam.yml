name: redteam

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # A red-team suite is also useful on a schedule, to catch drift in a live target.
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install
        run: uv pip install --system -e ".[dev]"

      # Deterministic core: detectors, mutators, owasp mapping, gate.
      - name: Unit tests
        run: pytest

